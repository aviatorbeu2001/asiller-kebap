<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asiller Kebap — Menü</title>
<style>
  :root{
    --kor:#141210;
    --kor2:#1e1a17;
    --kor3:#252018;
    --alev:#E8521E;
    --alev-koyu:#C44218;
    --alev-parlak:#FF6B35;
    --bakir:#C4823A;
    --krem:#F5EDE0;
    --krem-soluk:#C8B99A;
    --basari:#4E8B44;
    --bekleme:#D4A832;
    --mor:#8B5CF6;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:-apple-system,'SF Pro Display','Segoe UI',sans-serif;
    background:var(--kor);
    color:var(--krem);
    min-height:100vh;
  }
  .font-display{
    font-family:Georgia,'Times New Roman',serif;
    letter-spacing:0.01em;
  }

  /* --- MOD SEÇİCİ --- */
  .demo-bar{
    background:#0A0908;
    border-bottom:1px solid #2a2218;
    padding:10px 16px;
    display:flex; gap:8px; align-items:center; flex-wrap:wrap;
    font-size:13px;
  }
  .demo-bar span{color:#6a6055; margin-right:4px; font-size:12px; letter-spacing:0.05em;}
  .demo-btn{
    background:rgba(255,255,255,.04);
    border:1px solid #3a3228;
    color:var(--krem-soluk);
    padding:6px 14px; border-radius:20px; cursor:pointer; font-size:13px;
    transition:.2s;
  }
  .demo-btn:hover{border-color:var(--alev); color:var(--krem);}
  .demo-btn.active{
    background:linear-gradient(135deg,var(--alev),var(--alev-koyu));
    border-color:transparent; color:#fff;
    box-shadow:0 2px 12px rgba(232,82,30,.4);
  }

  .screen{display:none; min-height:calc(100vh - 46px);}
  .screen.active{display:block;}

  /* ============ MÜŞTERİ MENÜSÜ ============ */
  .phone-wrap{
    max-width:430px;
    margin:0 auto;
    min-height:calc(100vh - 46px);
    background:var(--kor);
    position:relative;
    display:flex; flex-direction:column;
  }

  /* HEADER — degrade + ızgara desen */
  .menu-header{
    padding:30px 20px 22px;
    background:linear-gradient(160deg, #2a1e14 0%, #1a1208 60%, var(--kor) 100%);
    border-bottom:1px solid rgba(196,130,58,.2);
    position:relative;
    overflow:hidden;
  }
  .menu-header::before{
    content:'';
    position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(196,130,58,.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(196,130,58,.06) 1px, transparent 1px);
    background-size:28px 28px;
    pointer-events:none;
  }
  .menu-header::after{
    content:'';
    position:absolute;
    top:-60px; right:-40px;
    width:180px; height:180px;
    background:radial-gradient(circle, rgba(232,82,30,.18) 0%, transparent 70%);
    pointer-events:none;
  }
  .table-tag{
    display:inline-flex; align-items:center; gap:5px;
    background:rgba(232,82,30,.15);
    border:1px solid rgba(232,82,30,.4);
    color:var(--alev-parlak);
    font-size:11px; font-weight:700;
    padding:4px 10px; border-radius:20px;
    margin-bottom:12px;
    letter-spacing:0.06em;
    text-transform:uppercase;
  }
  .table-tag::before{
    content:'◉'; font-size:8px;
    animation:pulse 2s infinite;
  }
  @keyframes pulse{
    0%,100%{opacity:1;} 50%{opacity:.3;}
  }
  .menu-header h1{
    font-size:30px; font-weight:700;
    color:var(--krem);
    font-family:Georgia,serif;
    line-height:1.1;
    position:relative;
    text-shadow:0 2px 20px rgba(0,0,0,.5);
  }
  .header-sub{
    display:flex; align-items:center; gap:8px;
    margin-top:6px;
  }
  .header-sub p{
    font-size:12.5px; color:var(--krem-soluk); opacity:.8;
  }
  .header-badge{
    font-size:10px; color:var(--bakir);
    background:rgba(196,130,58,.1);
    border:1px solid rgba(196,130,58,.2);
    padding:2px 8px; border-radius:10px;
    font-weight:600; letter-spacing:0.05em;
  }

  /* KATEGORİ SEKMELERİ */
  .cat-tabs-wrap{
    position:sticky; top:0;
    z-index:6;
    background:var(--kor);
    border-bottom:1px solid rgba(255,255,255,.05);
    box-shadow:0 4px 20px rgba(0,0,0,.4);
  }
  .cat-tabs{
    display:flex; gap:8px; overflow-x:auto;
    padding:12px 16px 10px;
    scrollbar-width:none;
  }
  .cat-tabs-fade{
    position:absolute; top:0; right:0; bottom:10px; width:40px;
    background:linear-gradient(to right,transparent,var(--kor));
    pointer-events:none;
  }
  .cat-tabs::-webkit-scrollbar{display:none;}
  .cat-tab{
    white-space:nowrap; flex-shrink:0;
    padding:7px 16px; border-radius:20px;
    border:1px solid rgba(255,255,255,.08);
    color:var(--krem-soluk); font-size:12.5px; font-weight:500;
    cursor:pointer; background:rgba(255,255,255,.03);
    transition:.2s;
  }
  .cat-tab:hover{border-color:rgba(232,82,30,.4); color:var(--krem);}
  .cat-tab.active{
    background:linear-gradient(135deg,var(--alev),var(--alev-koyu));
    border-color:transparent; color:#fff; font-weight:700;
    box-shadow:0 2px 12px rgba(232,82,30,.35);
  }

  /* MENÜ GÖVDE */
  .menu-body{ flex:1; padding:16px 16px 140px; }
  .cat-title{
    font-size:12px; color:var(--bakir);
    text-transform:uppercase; letter-spacing:0.1em;
    margin:28px 0 12px; font-weight:700;
    display:flex; align-items:center; gap:10px;
  }
  .cat-title::after{
    content:''; flex:1; height:1px;
    background:linear-gradient(to right,rgba(196,130,58,.25),transparent);
  }

  /* ÜRÜN KARTI */
  .item-card{
    display:flex; gap:14px;
    padding:14px;
    margin-bottom:10px;
    background:var(--kor2);
    border-radius:16px;
    border:1px solid rgba(255,255,255,.05);
    box-shadow:0 2px 12px rgba(0,0,0,.3);
    transition:.2s;
    position:relative;
    overflow:hidden;
  }
  .item-card::before{
    content:'';
    position:absolute; top:0; left:0; right:0; height:1px;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);
  }
  .item-emoji{
    width:72px; height:72px;
    border-radius:14px;
    background:linear-gradient(135deg,var(--kor3),#1a130a);
    display:flex; align-items:center; justify-content:center;
    font-size:32px; flex-shrink:0;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.06), 0 4px 12px rgba(0,0,0,.3);
    border:1px solid rgba(255,255,255,.06);
  }
  .item-info{flex:1; min-width:0;}
  .item-info h3{
    font-size:14.5px; font-weight:600; color:var(--krem);
    line-height:1.3;
  }
  .item-info p{
    font-size:12px; color:rgba(200,185,154,.5);
    margin-top:3px; line-height:1.4;
  }
  .item-info p:empty{display:none;}
  .item-meta{
    display:flex; align-items:center; gap:8px; margin-top:10px;
  }
  .item-price{
    font-size:17px; font-weight:800; color:var(--krem);
    letter-spacing:-0.01em;
  }
  .item-eta{
    display:inline-flex; align-items:center; gap:4px;
    font-size:11px; color:var(--bekleme);
    background:rgba(212,168,50,.1);
    border:1px solid rgba(212,168,50,.2);
    padding:2px 8px; border-radius:10px; font-weight:600;
  }
  .eta-dot{
    width:4px; height:4px; border-radius:50%;
    background:var(--bekleme); display:inline-block;
  }
  .item-bottom{
    display:flex; align-items:center; justify-content:flex-end;
    margin-top:10px;
  }
  .qty-ctrl{
    display:flex; align-items:center; gap:12px;
    background:rgba(255,255,255,.06);
    border-radius:10px; padding:4px 8px;
    border:1px solid rgba(255,255,255,.08);
  }
  .qty-btn{
    width:26px; height:26px; border-radius:8px; border:none;
    background:linear-gradient(135deg,var(--alev),var(--alev-koyu));
    color:#fff; font-size:16px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 2px 8px rgba(232,82,30,.3);
    font-weight:700; line-height:1;
  }
  .qty-btn:disabled{background:rgba(255,255,255,.08); box-shadow:none; cursor:default;}
  .qty-num{font-size:15px; font-weight:700; min-width:18px; text-align:center; color:var(--krem);}
  .add-btn{
    font-size:12.5px; padding:7px 18px; border-radius:10px;
    background:rgba(232,82,30,.1);
    border:1px solid rgba(232,82,30,.35);
    color:var(--alev-parlak); cursor:pointer; font-weight:700;
    transition:.2s;
  }
  .add-btn:hover{background:rgba(232,82,30,.2);}

  /* SİPARİŞ ÇUBUĞU */
  .cart-bar{
    position:fixed; bottom:0; left:50%;
    transform:translateX(-50%);
    width:100%; max-width:430px;
    background:linear-gradient(135deg,var(--alev),var(--alev-koyu));
    padding:16px 22px;
    display:flex; align-items:center; justify-content:space-between;
    cursor:pointer;
    box-shadow:0 -4px 30px rgba(232,82,30,.4);
    border-top:1px solid rgba(255,255,255,.1);
  }
  .cart-bar.hidden{display:none;}
  .cart-left{display:flex; align-items:center; gap:12px;}
  .cart-count{
    background:rgba(255,255,255,.2); backdrop-filter:blur(4px);
    color:#fff; width:26px; height:26px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:13px; font-weight:800; border:1px solid rgba(255,255,255,.3);
  }
  .cart-bar .label{color:#fff; font-weight:700; font-size:15px;}
  .cart-bar .total{
    color:#fff; font-weight:800; font-size:17px;
    text-shadow:0 1px 4px rgba(0,0,0,.2);
  }

  /* SHEET / OVERLAY */
  .overlay{
    position:fixed; inset:0;
    background:rgba(0,0,0,.7); backdrop-filter:blur(4px);
    display:none; align-items:flex-end; justify-content:center; z-index:50;
  }
  .overlay.show{display:flex;}
  .sheet{
    width:100%; max-width:430px;
    background:var(--kor2);
    border-radius:22px 22px 0 0;
    max-height:88vh;
    display:flex; flex-direction:column;
    border-top:1px solid rgba(255,255,255,.08);
    box-shadow:0 -10px 60px rgba(0,0,0,.6);
  }
  .sheet::before{
    content:''; display:block;
    width:36px; height:4px; border-radius:2px;
    background:rgba(255,255,255,.15);
    margin:12px auto 0;
    flex-shrink:0;
  }
  .sheet-head{
    padding:14px 22px 12px;
    border-bottom:1px solid rgba(255,255,255,.06);
    display:flex; align-items:center; justify-content:space-between;
  }
  .sheet-head h2{font-size:18px; font-weight:700; color:var(--krem);}
  .sheet-close{
    background:rgba(255,255,255,.08); border:none; color:var(--krem-soluk);
    width:28px; height:28px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:14px; cursor:pointer;
  }
  .sheet-body{ padding:16px 22px; overflow-y:auto; flex:1; }
  .cart-line{
    display:flex; justify-content:space-between; align-items:center;
    padding:12px 0; border-bottom:1px solid rgba(255,255,255,.05); font-size:14px;
  }
  .cart-line .cl-name{color:var(--krem); font-weight:500;}
  .cart-line .cl-sub{font-size:12px; color:var(--krem-soluk); margin-top:2px;}
  .cart-line .cl-price{font-weight:700; color:var(--krem); font-size:15px;}
  .cart-remove{
    background:none; border:none; color:#a35c4a; font-size:11px;
    cursor:pointer; margin-left:8px; opacity:.7;
  }
  .note-box{
    width:100%; background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.08); border-radius:12px;
    padding:12px 14px; color:var(--krem); font-size:13.5px;
    margin-top:14px; resize:none; font-family:inherit;
  }
  .note-box::placeholder{color:rgba(200,185,154,.35);}
  .note-box:focus{outline:none; border-color:rgba(232,82,30,.4);}
  .total-row{
    display:flex; justify-content:space-between;
    padding:16px 0 4px; font-size:17px; font-weight:800;
    border-top:1px solid rgba(255,255,255,.06); margin-top:10px;
  }
  .sheet-foot{ padding:14px 22px 24px; border-top:1px solid rgba(255,255,255,.05); }
  .pay-btn{
    width:100%;
    background:linear-gradient(135deg,var(--alev),var(--alev-koyu));
    color:#fff; border:none; padding:16px; border-radius:14px;
    font-size:15.5px; font-weight:700; cursor:pointer;
    box-shadow:0 4px 20px rgba(232,82,30,.4);
    letter-spacing:0.01em;
  }
  .pay-btn:disabled{background:rgba(255,255,255,.08); box-shadow:none; cursor:default;}

  /* ONAY EKRANI */
  .confirm-wrap{
    flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    text-align:center; padding:40px 24px;
    background:radial-gradient(ellipse at 50% 30%, rgba(232,82,30,.07) 0%, transparent 60%);
  }
  .confirm-badge{
    width:96px; height:96px; border-radius:50%;
    background:linear-gradient(135deg,var(--basari),#3a6e32);
    display:flex; align-items:center; justify-content:center;
    font-size:42px; color:#fff; margin-bottom:8px;
    box-shadow:0 8px 30px rgba(78,139,68,.4);
  }
  .order-num{
    font-family:Georgia,serif; font-size:64px; font-weight:700;
    background:linear-gradient(135deg,var(--alev-parlak),var(--bakir));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
    letter-spacing:0.02em; margin:4px 0;
    filter:drop-shadow(0 4px 12px rgba(232,82,30,.3));
  }
  .order-num-label{
    font-size:11px; color:var(--krem-soluk); opacity:.6;
    text-transform:uppercase; letter-spacing:0.12em;
  }
  .confirm-wrap h2{font-size:20px; margin:20px 0 6px; color:var(--krem); font-weight:700;}
  .confirm-wrap p{font-size:14px; color:var(--krem-soluk); line-height:1.6; max-width:300px; opacity:.8;}
  .eta-badge{
    margin-top:18px; display:inline-flex; align-items:center; gap:8px;
    background:rgba(232,82,30,.1);
    border:1px solid rgba(232,82,30,.3);
    color:var(--alev-parlak); padding:10px 22px; border-radius:24px;
    font-size:14px; font-weight:700;
  }
  .eta-badge::before{content:'⏱';}
  .status-track{display:flex; align-items:center; gap:6px; margin-top:32px;}
  .status-dot{
    width:10px; height:10px; border-radius:50%; background:rgba(255,255,255,.1);
    border:2px solid rgba(255,255,255,.15);
  }
  .status-dot.on{
    background:var(--alev); border-color:var(--alev);
    box-shadow:0 0 10px rgba(232,82,30,.5);
  }
  .status-line{width:36px; height:2px; background:rgba(255,255,255,.08);}
  .status-line.on{background:var(--alev);}
  .status-text{font-size:12.5px; color:var(--krem-soluk); margin-top:10px; opacity:.7;}
  .back-to-menu{
    margin-top:32px; background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.1); color:var(--krem-soluk);
    padding:12px 26px; border-radius:12px; font-size:13px; cursor:pointer;
    font-family:inherit; transition:.2s;
  }
  .back-to-menu:hover{background:rgba(255,255,255,.1); color:var(--krem);}

  /* MUTFAK & KASA EKRANI */
  .kitchen-wrap{
    padding:24px 24px 60px;
    background:var(--kor);
    min-height:calc(100vh - 46px);
  }
  .kitchen-head{
    display:flex; align-items:flex-start; justify-content:space-between;
    margin-bottom:24px; flex-wrap:wrap; gap:12px;
  }
  .kitchen-head h1{
    font-size:26px; font-weight:700; font-family:Georgia,serif;
    background:linear-gradient(135deg,var(--krem) 0%,var(--bakir) 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
  }
  .kitchen-head .sub{font-size:12.5px; color:var(--krem-soluk); margin-top:4px; opacity:.6;}
  .clock{
    font-size:22px; font-weight:300; font-variant-numeric:tabular-nums;
    color:var(--krem-soluk); opacity:.5; font-family:Georgia,serif;
  }

  .kanban{display:grid; grid-template-columns:repeat(3,1fr); gap:16px;}
  .kcol-head{
    display:flex; align-items:center; gap:8px;
    font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:0.1em;
    margin-bottom:14px; padding-bottom:12px; border-bottom:2px solid;
  }
  .kcol-head .count{
    background:rgba(255,255,255,.1); padding:2px 10px;
    border-radius:10px; font-size:12px;
  }
  .kcol.waiting .kcol-head{color:var(--bekleme); border-color:rgba(212,168,50,.4);}
  .kcol.cooking .kcol-head{color:var(--alev-parlak); border-color:rgba(232,82,30,.4);}
  .kcol.ready .kcol-head{color:#6BCF5A; border-color:rgba(107,207,90,.4);}

  .kcards{display:flex; flex-direction:column; gap:10px; min-height:60px;}
  .empty-col{
    border:1.5px dashed rgba(255,255,255,.08); border-radius:12px;
    padding:28px 10px; text-align:center;
    color:rgba(255,255,255,.2); font-size:12.5px;
  }

  .order-card{
    background:var(--kor2);
    border:1px solid rgba(255,255,255,.06);
    border-left:3px solid var(--bekleme);
    border-radius:14px; padding:14px 16px;
    animation:slideIn .3s ease;
    box-shadow:0 4px 16px rgba(0,0,0,.3);
    position:relative; overflow:hidden;
  }
  .order-card::before{
    content:'';
    position:absolute; top:0; left:0; right:0; height:1px;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);
  }
  .order-card.cooking{border-left-color:var(--alev);}
  .order-card.ready{border-left-color:#6BCF5A;}
  .order-card.teslim{border-left-color:#4a4038; opacity:.7;}
  @keyframes slideIn{
    from{opacity:0; transform:translateY(-10px);}
    to{opacity:1; transform:translateY(0);}
  }
  .oc-top{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:6px;}
  .oc-num{
    font-family:Georgia,serif; font-size:24px; font-weight:700;
    color:var(--krem);
  }
  .oc-table{
    font-size:11px; background:rgba(255,255,255,.08); color:var(--krem-soluk);
    padding:3px 10px; border-radius:20px; font-weight:700; letter-spacing:0.04em;
  }
  .oc-time{font-size:11px; color:rgba(255,255,255,.3); margin-bottom:8px;}
  .oc-pay{
    display:inline-block; font-size:10.5px; font-weight:700;
    padding:2px 9px; border-radius:10px; margin-bottom:8px; letter-spacing:0.03em;
  }
  .oc-pay.cash{background:rgba(212,168,50,.12); color:var(--bekleme); border:1px solid rgba(212,168,50,.2);}
  .oc-pay.paid{background:rgba(107,207,90,.1); color:#6BCF5A; border:1px solid rgba(107,207,90,.2);}
  .oc-items{font-size:12.5px; line-height:1.8; color:rgba(200,185,154,.6); margin-bottom:10px;}
  .oc-items b{color:var(--krem); font-weight:600;}
  .oc-item-mins{font-size:10.5px; color:rgba(255,255,255,.2);}
  .oc-note{
    font-size:11.5px; color:var(--bekleme); margin-bottom:10px;
    background:rgba(212,168,50,.07); padding:6px 10px; border-radius:8px;
    border-left:2px solid rgba(212,168,50,.3);
  }
  .oc-toplam{font-size:13px; color:rgba(200,185,154,.6); margin-bottom:10px;}
  .oc-toplam b{color:var(--krem); font-size:16px; font-weight:800;}
  .oc-actions{display:flex; gap:8px; margin-top:2px;}
  .oc-btn{
    flex:1; padding:9px; border-radius:10px; border:none; cursor:pointer;
    font-size:12px; font-weight:700; transition:.15s; font-family:inherit;
  }
  .oc-btn.start{
    background:linear-gradient(135deg,var(--alev),var(--alev-koyu));
    color:#fff; box-shadow:0 2px 10px rgba(232,82,30,.3);
  }
  .oc-btn.done{
    background:linear-gradient(135deg,#4E8B44,#3a6e32);
    color:#fff; box-shadow:0 2px 10px rgba(78,139,68,.3);
  }
  .oc-btn.serve{
    background:rgba(255,255,255,.08); color:var(--krem);
    border:1px solid rgba(255,255,255,.12);
  }

  @media (max-width:860px){.kanban{grid-template-columns:1fr;}}

  /* ALINAN ÖDEMELER TAM EKRAN */
  .ao-gir-btn{
    display:inline-flex; align-items:center; gap:10px;
    background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.12);
    color:var(--krem); padding:14px 32px; border-radius:14px;

async function sbGet(path){
  const r = await fetch(SUPABASE_URL+'/rest/v1/'+path,{headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}});
  return r.json();
}
async function sbPost(table, data){
  const r = await fetch(SUPABASE_URL+'/rest/v1/'+table,{method:'POST',headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=representation'},body:JSON.stringify(data)});
  return r.json();
}

async function getSiparisNo(){
  const bugun = new Date().toISOString().split('T')[0];
  const rows = await sbGet('orders?olusturma_zamani=gte.'+bugun+'T00:00:00&select=siparis_no&order=olusturma_zamani.desc&limit=1');
  if(!rows||rows.length===0) return 'A-01';
  return 'A-'+String(parseInt(rows[0].siparis_no.split('-')[1])+1).padStart(2,'0');
}

function itemCtrlHtml(id){
  const qty = cart[id]||0;
  if(qty===0) return '<button class="add-btn" onclick="changeQty(\''+id+'\',1)">Ekle</button>';
  return '<div class="qty-ctrl"><button class="qty-btn" onclick="changeQty(\''+id+'\',-1)">−</button><span class="qty-num">'+qty+'</span><button class="qty-btn" onclick="changeQty(\''+id+'\',1)">+</button></div>';
}
function renderItemCtrl(id){ const el=document.getElementById('ctrl-'+id); if(el) el.innerHTML=itemCtrlHtml(id); }

function scrollToSection(gi){
  const s=document.getElementById('section-'+gi), bar=document.querySelector('.cat-tabs-wrap');
  if(!s) return;
  window.scrollTo({top:s.getBoundingClientRect().top+window.scrollY-(bar?bar.offsetHeight:0)-8,behavior:'smooth'});
}

function renderMenu(){
  const tabs=document.getElementById('catTabs'), body=document.getElementById('menuBody');
  tabs.innerHTML=''; body.innerHTML='';
  MENU.forEach((group,gi)=>{
    const tab=document.createElement('button');
    tab.className='cat-tab'+(gi===0?' active':'');
    tab.textContent=group.cat;
    tab.onclick=()=>{ document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('active')); tab.classList.add('active'); scrollToSection(gi); };
    tabs.appendChild(tab);
    const section=document.createElement('div'); section.id='section-'+gi;
    const title=document.createElement('div'); title.className='cat-title'; title.textContent=group.cat;
    section.appendChild(title);
    group.items.forEach(item=>{
      const card=document.createElement('div'); card.className='item-card';
      card.innerHTML='<div class="item-emoji">'+item.emoji+'</div><div class="item-info"><h3>'+item.name+'</h3><p>'+item.desc+'</p><div class="item-meta"><span class="item-price">'+item.price+' ₺</span></div><div class="item-bottom"><div id="ctrl-'+item.id+'">'+itemCtrlHtml(item.id)+'</div></div></div>';
      section.appendChild(card);
    });
    body.appendChild(section);
  });
}

function changeQty(id,delta){ cart[id]=(cart[id]||0)+delta; if(cart[id]<=0) delete cart[id]; renderItemCtrl(id); updateCartBar(); }
function findItem(id){ for(const g of MENU){ const f=g.items.find(i=>i.id===id); if(f) return f; } }
function cartTotalValue(){ let t=0; for(const id in cart) t+=findItem(id).price*cart[id]; return t; }
function cartCountValue(){ let c=0; for(const id in cart) c+=cart[id]; return c; }

function updateCartBar(){
  const bar=document.getElementById('cartBar'), count=cartCountValue();
  const confirmActive=document.getElementById('screen-confirm').classList.contains('active');
  if(count===0||confirmActive){ bar.classList.add('hidden'); return; }
  bar.classList.remove('hidden');
  document.getElementById('cartCount').textContent=count;
  document.getElementById('cartTotal').textContent=cartTotalValue()+' ₺';
}

    const item=findItem(id), row=document.createElement('div'); row.className='cart-line';
    row.innerHTML='<div><div class="cl-name">'+item.name+'</div><div class="cl-sub">'+cart[id]+' adet × '+item.price+' ₺ <button class="cart-remove" onclick="removeFromCart(\''+id+'\')">kaldır</button></div></div><div class="cl-price">'+(item.price*cart[id])+' ₺</div>';
    lines.appendChild(row);
  }
  document.getElementById('cartTotal2').textContent=cartTotalValue()+' ₺';
  document.getElementById('cartOverlay').classList.add('show');
}
function removeFromCart(id){ delete cart[id]; renderItemCtrl(id); updateCartBar(); openCart(); }
function closeOverlay(id){ document.getElementById(id).classList.remove('show'); }

async function confirmOrder(){
  if(cartCountValue()===0) return;
  const btn=document.getElementById('goCheckoutBtn');
  btn.disabled=true; btn.textContent='Gönderiliyor...';
  try{
    const siparisNo=await getSiparisNo();
    const toplam=cartTotalValue();
    const note=document.getElementById('orderNote').value.trim();
    const orders=await sbPost('orders',{siparis_no:siparisNo,masa_no:MASA_NO,durum:'bekliyor',odeme:'bekliyor',toplam,musteri_notu:note});
    if(!orders||orders.error||orders.length===0) throw new Error('Hata');
    const orderId=orders[0].id;
    for(const id in cart){
      const item=findItem(id);
      await sbPost('order_items',{order_id:orderId,urun_adi:item.name,adet:cart[id],birim_fiyat:item.price,hazirlama_dk:item.mins});
    }
    document.getElementById('confirmOrderNum').textContent=siparisNo;
    document.getElementById('cartBar').classList.add('hidden');
    document.getElementById('cartOverlay').classList.remove('show');
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById('screen-confirm').classList.add('active');
    window.scrollTo({top:0,behavior:'smooth'});
    cart={};
    document.getElementById('orderNote').value='';
    renderMenu();
  }catch(e){
    alert('Bir hata oluştu, lütfen tekrar deneyin.');
    console.error(e);
  }finally{
    btn.disabled=false; btn.textContent='Siparişi onayla';
  }
}

function backToMenu(){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-musteri').classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

renderMenu();
</script>
</body>
</html>
